<!DOCTYPE html>
<html lang="vi-VN">
<head>
    <meta charset="utf-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Xác Minh Captcha - Vũ Xuân Kiên ❤</title>
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="address=no">
    <meta name="keywords" content="xuankien, vuxuankien, xuankiendzz">
    <meta name="description" content="Trang xác minh để truy cập thông tin thanh toán">
    <meta property="og:description" content="Trang xác minh để truy cập thông tin thanh toán">
    <meta property="og:type" content="article">
    <meta property="og:locale" content="vi-VN">
    <meta property="og:title" content="Xác Minh - XuanKienWithLove">
    <meta property="og:image" content="https://i.imgur.com/NopdDnz.png">
    <link rel="shortcut icon" href="https://i.imgur.com/mruOsLm.jpg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap">
    <style>
        .hidden { display: none !important; }
        #turnstile-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }
        .cf-turnstile { transform: scale(1.3); }
    </style>
</head>
<body>
    <div id="turnstile-overlay">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAABfVNd2-10jMYn6n" data-theme="dark" data-callback="onTurnstileSuccess" data-action="managed" data-retry="auto"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script>
        function onTurnstileSuccess(token) {
            console.log('Turnstile token:', token);
            setTimeout(() => {
                window.location.href = 'https://xuankien.pages.dev/';
            }, 2000);
        }
    </script>
</body>
</html>
