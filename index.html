<!DOCTYPE html>
<html lang="vi-VN">
<head>
    <meta charset="utf-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Redirect - XuanKienWithLove</title>
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="address=no">
    <meta name="keywords" content="xuankien, vuxuankien, xuankiendzz">
    <meta name="description" content="Trang chuyển hướng tới thông tin thanh toán">
    <meta property="og:description" content="Trang chuyển hướng tới thông tin thanh toán">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="vi-VN">
    <meta property="og:title" content="Redirect - XuanKienWithLove">
    <link rel="shortcut icon" href="https://i.imgur.com/mruOsLm.jpg">
    <meta property="og:image" content="https://i.imgur.com/NopdDnz.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap">
    <style>
        #turnstile-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }
        #turnstile-overlay.hidden {
            display: none;
        }
        .cf-turnstile {
            transform: scale(1.3);
        }
        #main-content {
            display: none;
        }
        #main-content.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div id="turnstile-overlay">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAABfVNd2-10jMYn6n" data-theme="dark" data-callback="onTurnstileSuccess"></div>
    </div>
    <div id="main-content">
        <div class="preloader">
            <div class="preloader__wrap">
                <div class="circle-pulse">
                    <div class="circle-pulse__1"></div>
                    <div class="circle-pulse__2"></div>
                </div>
                <div class="preloader__progress">
                    <span></span>
                </div>
            </div>
        </div>
    </div>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script>
        function onTurnstileSuccess(token) {
            setTimeout(function() {
                document.getElementById('turnstile-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');
                window.location.href = 'vxkdepchai.html';
            }, 2000);
        }
        document.addEventListener('DOMContentLoaded', function() {
            if (document.cookie.includes('cf_clearance')) {
                document.getElementById('turnstile-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');
                window.location.href = 'vxkdepchai.html';
            } else {
                document.getElementById('turnstile-overlay').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('visible');
            }
        });
    </script>
</body>
</html>
